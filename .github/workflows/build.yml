name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          # 安装依赖
          brew install ldid
          
          # 克隆 Theos
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          
          # 下载 iOS SDK
          cd $HOME/theos
          git clone --depth=1 https://github.com/theos/sdks
      
      - name: Build
        run: |
          make package
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BoYuCardKey
          path: packages/*.deb
