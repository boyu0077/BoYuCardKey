name: Build Tweak

on: [push]

jobs:
  build:
    runs-on: macos-12
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Theos
        run: |
          brew install ldid
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH
          cd $HOME/theos
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xf iPhoneOS14.5.sdk.tar.xz
      
      - name: Build
        run: |
          make package
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BoYuCardKey
          path: packages/*.deb
